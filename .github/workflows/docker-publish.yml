name: Docker Publish

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx 
        uses: docker/setup-buildx-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: |
          docker build . -tag ghcr.io/gerardo-rojas/skills-publish-docker-images/Stackoverflown:main
      - name: Publish
        run: |
          docker login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          docker push ghcr.io/gerardo-rojas/skills-publish-docker-images/Stackoverflown:main